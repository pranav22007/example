<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <title>Elite Library Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        /* Extra styles for search and login */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .search-container {
            margin-bottom: 16px;
        }
        .history-item {
            font-size: 12px;
            padding: 8px;
            border-bottom: 1px solid #f1f5f9;
        }
        .history-item:last-child { border: none; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="modal-content" style="box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <div style="padding: 32px; text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 16px;">📚</div>
                <h2 style="margin:0 0 8px 0;">Library Login</h2>
                <p style="color:#64748b; margin-bottom: 24px;">Admin Access Required</p>
                <form id="login-form">
                    <div class="form-group" style="text-align: left;">
                        <label>Username</label>
                        <input type="text" id="login-user" value="username" required>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label>Password</label>
                        <input type="password" id="login-pass" value="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Enter System</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <div class="container">
            <!-- Floating Nav -->
            <div class="nav-menu">
                <button class="nav-btn active" onclick="switchTab('floor-plan-tab', this)">
                    <span>🪑</span> Floor Plan
                </button>
                <button class="nav-btn" onclick="switchTab('students-tab', this)">
                    <span>👥</span> Students
                </button>
                <button class="nav-btn" onclick="switchTab('notif-tab', this)">
                    <span>🔔</span> Alerts <span id="notif-badge" class="badge" style="display:none">0</span>
                </button>
            </div>

            <div id="floor-plan-tab" class="tab-content active">
                <div class="header">
                    <div>
                        <h1>Library Map</h1>
                        <p style="margin:4px 0 0 0; color:#64748b; font-size:14px; font-weight:500;">200 Professional Workspaces</p>
                    </div>
                    <div class="legend" style="display:flex; gap:12px;">
                        <div style="display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600;">
                            <div style="width:12px; height:12px; background:#f1f5f9; border-radius:4px; border:1px solid #e2e8f0;"></div> Avail
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600;">
                            <div style="width:12px; height:12px; background:#2563eb; border-radius:4px;"></div> Occ
                        </div>
                    </div>
                </div>

                <div class="floor-plan">
                    <div class="library-map" id="library-map"></div>
                </div>
            </div>

            <div id="students-tab" class="tab-content">
                <div class="header">
                    <h1 style="margin:0;">All Students</h1>
                    <div class="search-container" style="margin:0; flex:1; max-width:400px;">
                        <input type="text" id="search-input" placeholder="🔍 Search by name or mobile..." oninput="updateMap()" style="padding:10px 16px;">
                    </div>
                </div>
                <div class="student-grid" id="student-list-grid"></div>
            </div>

            <div id="notif-tab" class="tab-content">
                <div class="header">
                    <h1>Action Required</h1>
                    <p style="color:#64748b; font-size:14px;">Memberships expiring soon.</p>
                </div>
                <div id="notification-list" class="student-grid"></div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="assign-modal" class="modal">
        <div class="modal-content">
            <div style="padding: 24px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                <h2 style="margin:0; font-size:1.25rem;">Register Seat #<span id="assign-seat-number"></span></h2>
            </div>
            <div style="padding: 24px;">
                <form id="assign-form">
                    <div class="form-group">
                        <label>Student Full Name</label>
                        <input type="text" id="name" placeholder="Enter name..." required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="mobile" placeholder="10-digit number" required pattern="[0-9]{10}">
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label>Plan Type</label>
                            <select id="plan_type" required>
                                <option value="full_time">Full (₹1000)</option>
                                <option value="half_time">Half (₹500)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Amount Paid</label>
                            <input type="number" id="amount_paid" required min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Fee for Month</label>
                        <input type="month" id="fee_month" required>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:12px;">
                        <button type="submit" class="btn btn-primary">Save Member</button>
                        <button type="button" class="btn" style="background:#f1f5f9; color:#64748b;" onclick="closeModals()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <div style="padding: 24px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                <h2 style="margin:0; font-size:1.25rem;">Workspace Info</h2>
            </div>
            <div style="padding: 24px;">
                <div id="seat-info-details"></div>
                
                <div style="margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
                    <label style="font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase;">Quick Update</label>
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <input type="number" id="update-pay" placeholder="Add Payment (₹)" style="flex:1">
                        <button class="btn btn-primary" style="width:auto; padding:0 16px;" onclick="addPayment()">ADD</button>
                    </div>
                    <button class="btn btn-primary" style="margin-top:10px; background:#059669;" onclick="extendMembership()">+ EXTEND 30 DAYS</button>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:24px;">
                    <button id="btn-remove-user" class="btn" style="background:#fee2e2; color:#991b1b;">Vacate Seat</button>
                    <button type="button" class="btn" style="background:#f1f5f9; color:#64748b;" onclick="closeModals()">Close</button>
                    <button type="button" onclick="debugSetExpire()" class="btn" style="grid-column: span 2; margin-top: 10px; background: #fff7ed; color: #c2410c; font-size: 11px; border: 1px dashed #fdba74;">🛠️ DEBUG: Set to 2 Days Left</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
